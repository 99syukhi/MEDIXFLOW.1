<!DOCTYPE html>
<html lang="nl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afdelingen | Medixflow</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/afdelingen.css">
    <link rel="icon" href="img/logo1.PNG" type="image/png">
  </head>

  <body id="app">
  <header id="header" :class="{ 'header-scrolled': isScrolled }">
    <a href="/">
    <img src="svg/logo.svg" class="logo" alt="Medixflow Logo"></a>
    <nav class="nav">
      <a class="nav-link"
         :class="{ active: currentPage === 'index.html' }"
         href="index.html">Home</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'afdelingen.html' }"
         href="afdelingen.html">Afdelingen</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'artsen.html' }"
         href="artsen.html">Artsen</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'contact.html' }"
         href="contact.html">Contact</a>
    </nav>

    <div class="auth-buttons">
    <a href="login_register.html" class="btn btn-secondary">INLOGGEN</a>
    </div>
  </header>

<main class="afdelingen-page">
        <section class="afdelingen-header">
            <h1>Onze Afdelingen</h1>
            <p>Overzicht van de beschikbare poliklinieken en bijbehorende artsen</p>
        </section>

        <section class="container">
            <div class="afdelingen-grid">
                <div v-for="afd in afdelingen" :key="afd.id" class="afdeling-card">
                    <div class="card-image">
                    <img :src="afd.img" :alt="afd.naam">
                    </div>

                    <div class="card-content">
                    <h3>{{ afd.naam }}</h3>
                    <p>{{ afd.tekst }}</p>
                    <a href="artsen.html" class="view-doctors">Bekijk artsen &rarr;</a>
                    </div>
                </div>
            </div>
        </section>
  </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Medixflow. Alle rechten voorbehouden.</p>
        </div>
    </footer>

  <script src="js/script.js"></script>

</body>
</html>
