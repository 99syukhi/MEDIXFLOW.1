<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Afspraken | Medixflow</title>
  <link rel="stylesheet" href="css/mijn-afspraken.css" />
  <link rel="icon" href="img/logo1.PNG" type="image/png">
</head>
<body>

    <header class="header">
        <div class="logo-section">
            <img src="img/medixflow-logo.png" alt="MedixFlow Logo" class="logo">
        </div>

        <div class="user-section">
            <div class="user-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" 
                     width="24" 
                     height="24" 
                     viewBox="0 0 24 24" 
                     fill="none" 
                     stroke="currentColor" 
                     stroke-width="2" 
                     stroke-linecap="round" 
                     stroke-linejoin="round" 
                     class="user-icon">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <button class="logout-btn">Uitloggen</button>
        </div>
    </header>

    <main class="main-content">

      <section class="page-title">
        <h2>Mijn Afspraken</h2>
        <p>Bekijk uw geplande afspraken</p>
      </section>

      <section class="appointments-area">
        <div class="frame">
          <div class="tabs" role="tablist" aria-label="Afspraken tabs">
            <button class="tab" data-tab="toekomstig" role="tab" aria-selected="true">
              Toekomstige afspraken
            </button>
            <button class="tab" data-tab="eerder" role="tab" aria-selected="false">
              Eerdere afspraken
            </button>
            <span class="tab-underline" aria-hidden="true"></span>
          </div>

          <div class="table-head">
            <div class="th">Datum</div>
            <div class="th">Tijd</div>
            <div class="th">Arts</div>
            <div class="th">Status</div>
          </div>

          <div class="table-body panel panel-toekomstig" data-panel="toekomstig"></div>
          <div class="table-body panel panel-eerder" data-panel="eerder"></div>
          
        </div> </section>

    <div class="back-wrap">
      <a class="back-btn" href="patiëntportaal.html">Terug naar patiëntportaal</a>
    </div>

  </main>

<script src="js/mijn-afspraken.js"></script>

</body>
</html>
