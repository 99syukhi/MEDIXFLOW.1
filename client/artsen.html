<!DOCTYPE html>
<html lang="nl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artsen | Medixflow</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/artsen.css">
    <link rel="icon" href="img/logo1.PNG" type="image/png">
  </head>

  <body id="app">
  <header id="header" :class="{ 'header-scrolled': isScrolled }">
    <a href="/">
    <img src="svg/logo.svg" class="logo" alt="Medixflow Logo"></a>
    <nav class="nav">
      <a class="nav-link"
         :class="{ active: currentPage === 'index.html' }"
         href="index.html">Home</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'afdelingen.html' }"
         href="afdelingen.html">Afdelingen</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'artsen.html' }"
         href="artsen.html">Artsen</a>

      <a class="nav-link" 
         :class="{ active: currentPage === 'contact.html' }"
         href="contact.html">Contact</a>
    </nav>

    <div class="auth-buttons">
    <a href="login_register.html" class="btn btn-secondary">INLOGGEN</a>
    </div>
  </header>

  <main class="artsen-page">
    <section class="artsen-header">
        <h1>Onze Artsen</h1>
        <p>Bekijk onze artsen en maak eenvoudig een afspraak</p>

        <div class="filter-controls">
            <div class="search-container">
                <input type="text" v-model="zoekTermArtsen" placeholder="Zoek een afdeling of arts...">
                <button class="search-btn" aria-label="Zoeken">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
                        <path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <section class="container">
        <div class="artsen-grid">
            <div v-for="arts in gefilterdeArtsen" :key="arts.id" class="arts-card">
                <div class="arts-afdeling-tag">Afdeling: {{ arts.afdeling }}</div>
                <div class="arts-image">
                    <img :src="arts.img" :alt="arts.naam">
                </div>
                <div class="arts-info">
                    <h3>{{ arts.naam }}</h3>
                    <p>{{ arts.specialisme }}</p>
                </div>
                <button class="btn-afspraak">Afspraak maken</button>
            </div>
        </div>
        
        <p v-if="gefilterdeArtsen.length === 0" style="text-align: center; margin-top: 20px;">
            Geen artsen gevonden voor deze zoekopdracht.
        </p>
    </section>
</main>

  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2026 Medixflow. Alle rechten voorbehouden.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
  
</body>
</html>
